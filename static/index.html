<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Pythia — MBARI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link href="/static/styles.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

  <div class="ocean-bg"></div>
  <div class="particles" id="particles"></div>

  <div class="container">

    <header>
      <div class="wordmark">
        <h1>Pythia</h1>
        <img src="/static/logo-mbari-3b.png" alt="MBARI" class="mbari-logo">
      </div>
      <p class="tagline">Object Detection Service</p>
      <nav class="quicklinks">
        <a class="quick-link" href="/docs">API Docs</a>
        <a class="quick-link" href="/q/health">Health</a>
      </nav>
      <div class="divider"></div>
    </header>

    <main class="workspace">

      <!-- Media panel -->
      <div class="card panel-media">
        <div class="panel-toolbar">
          <span class="card-label">Input</span>
          <div class="toolbar-actions">
            <button id="uploadFile" class="btn btn--icon btn--emphasis">
              <svg xmlns="http://www.w3.org/2000/svg" height="15" viewBox="0 0 24 24" width="15" fill="currentColor">
                <path d="M0 0h24v24H0z" fill="none"/>
                <path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/>
              </svg>
              Upload
            </button>
            <button id="clearImage" class="btn btn--icon" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" height="15" viewBox="0 0 24 24" width="15" fill="currentColor">
                <path d="M0 0h24v24H0z" fill="none"/>
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
              Clear
            </button>
            <button id="grabSnapshot" class="btn btn--icon" disabled>
              <svg height="15" viewBox="0 0 24 24" width="15" fill="currentColor">
                <path d="M4,4H7L9,2H15L17,4H20A2,2 0 0,1 22,6V18A2,2 0 0,1 20,20H4A2,2 0 0,1 2,18V6A2,2 0 0,1 4,4M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9Z"/>
              </svg>
              Snapshot
            </button>
          </div>
        </div>

        <div id="hiddenError" class="error-msg"></div>

        <div id="upload_hint" class="upload-hint">
          <ol class="hint-steps">
            <li class="hint-step">
              <span class="hint-step__num">01</span>
              <span class="hint-step__text">Click <strong>Upload</strong> to select an image</span>
            </li>
            <li class="hint-step">
              <span class="hint-step__num">02</span>
              <span class="hint-step__text">Press <strong>Run Algorithm</strong> to run inference</span>
            </li>
            <li class="hint-step">
              <span class="hint-step__num">03</span>
              <span class="hint-step__text">Detections appear in the <strong>Analysis</strong> panel</span>
            </li>
          </ol>
        </div>

        <div id="image_pane" hidden>
          <span class="concepts-figure">
            <img id="preview" class="concepts-figure__image image-details__image"/>
            <span id="svgDiv" class="concepts-figure__svg image-details__image"></span>
          </span>
        </div>

        <div id="video_pane" hidden>
          <video id="htmlVideoTag" controls autoplay>
            <p>Your browser doesn't support HTML5 video.</p>
          </video>
          <canvas id="hiddenCanvas" hidden></canvas>
        </div>

        <form id="msfe" class="file-meta">
          <div class="meta-row">
            <span class="meta-key">Name</span>
            <span id="filename" class="meta-val"></span>
          </div>
          <div class="meta-row">
            <span class="meta-key">Size</span>
            <span id="fileSize" class="meta-val"></span>
          </div>
          <div class="meta-row">
            <span class="meta-key">Type</span>
            <span id="fileType" class="meta-val"></span>
          </div>
          <label for="file_upload">
            <input id="file_upload" type="file">
          </label>
        </form>
      </div>

      <!-- Results panel -->
      <div class="card panel-results">
        <div class="panel-toolbar">
          <span class="card-label">Analysis</span>
          <button id="downloadResults" disabled class="btn btn--icon">
            <svg xmlns="http://www.w3.org/2000/svg" height="15" viewBox="0 0 24 24" width="15" fill="currentColor">
              <path d="M0 0h24v24H0z" fill="none"/>
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            Export
          </button>
        </div>

        <input id="runAlgoButton" type="submit" class="btn btn--primary" value="Run Algorithm" disabled>

        <details id="localizationBriefs" open class="results-section">
          <summary class="results-summary">
            <div class="results-heading-row">
              <h3 class="results-heading">Detections</h3>
              <em id="success" class="results-count"></em>
            </div>
          </summary>
          <ul id="predictions" class="meta-box__list"></ul>
        </details>
      </div>

    </main>

    <footer>
      <a href="https://www.mbari.org" class="nodecoration">Monterey Bay Aquarium Research Institute</a>
    </footer>

  </div>

  <script>
    const container = document.getElementById('particles');
    const count = 42;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 0.8;
      const left = Math.random() * 100;
      const delay = Math.random() * 22;
      const dur = Math.random() * 18 + 14;
      const drift = (Math.random() - 0.5) * 120;
      const opacity = Math.random() * 0.35 + 0.05;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${left}%;
        bottom:${Math.random() * -20}%;
        animation-duration:${dur}s;
        animation-delay:-${delay}s;
        --max-opacity:${opacity};
        --drift:${drift}px;
      `;
      container.appendChild(p);
    }
  </script>
  <script src="/static/scripts/model-server.js"></script>
  <script>
    const pageElements = {
      form: document.getElementById("msfe"),
      submitButton: document.getElementById("runAlgoButton"),
      fileInput: document.getElementById("file_upload"),
      hiddenError: document.getElementById("hiddenError"),
      previewImg: document.getElementById("preview"),
      imagePane: document.getElementById("image_pane"),
      svgDiv: document.getElementById("svgDiv"),
      successEl: document.getElementById("success"),
      predictionsEl: document.getElementById("predictions"),
      filename: document.getElementById("filename"),
      filesize: document.getElementById("fileSize"),
      filetype: document.getElementById("fileType"),
      downloadResults: document.getElementById("downloadResults"),
      uploadHeading: document.getElementById("uploadFile"),
      clearImage: document.getElementById("clearImage"),
      htmlVideoTag: document.getElementById("htmlVideoTag"),
      hiddenCanvas: document.getElementById("hiddenCanvas"),
      videoPane: document.getElementById("video_pane"),
      grabSnapshot: document.getElementById("grabSnapshot"),
      uploadHint: document.getElementById("upload_hint"),
    };
    const msfe = new ModelServerFrontEnd(pageElements);
  </script>

</body>

</html>
